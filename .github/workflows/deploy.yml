name: Scrape and Deploy RAG

on:
  schedule:
    - cron: '0 15 * * *' # Runs at 15:00 UTC (Around midnight KST)
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Ensure playwright or other browser tools are installed if needed (scraper uses requests so ok)

      - name: Run Scraper (Incremental)
        run: |
          # Run scraper with a limit to avoid timeouts, or no limit for full sync
          python scraper.py --limit 20
        env:
          # If we need env vars for cookies later, add them here
          dummy: value

      - name: Run Indexer
        run: python rag_indexer.py

      - name: Export Index for Web
        run: python export_for_web.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          # We only want to publish the static files, but publish_dir=./ publishes everything including raw md files which is fine.
          # Or we can move index.html and documents.json to a 'public' folder.
          # For simplicity, publishing root is fine for now, user can refine cleanup later.
          keep_files: true # Keep existing files if any (though gh-pages usually overwrites)
